appId: fr.lustin.digs
---
- launchApp:
    clearState: false
- runFlow: dismiss-dev-menu.yaml
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Collection"
    timeout: 10000
- extendedWaitUntil:
    notVisible: "Downloading.*"
    timeout: 30000
# Tap on the 2th folder row (Breakbeat & Breaks area, ~20% down the screen)
- tapOn:
    point: "50%, 21%"
- waitForAnimationToEnd
- takeScreenshot: 02-folder
